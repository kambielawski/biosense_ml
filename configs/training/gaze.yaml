# Training config for gaze dynamics model
epochs: 100

optimizer:
  name: adamw
  lr: 1e-4
  weight_decay: 1e-5
  betas: [0.9, 0.999]

scheduler:
  name: cosine
  warmup_epochs: 5
  min_lr: 1e-6

loss:
  crop: l1          # L1 on predicted 32×32 crop
  position: l1      # L1 on predicted (dy, dx) delta
  lambda_pos: 1.0   # Weight for position loss (equal to crop loss)

gradient_clip: 1.0

# Data
batch_size: 64
num_workers: 4

# Checkpointing
checkpoint_every: 10
keep_top_k: 3

# Logging
log_every: 10       # steps
val_every: 1        # epochs

seed: 42
