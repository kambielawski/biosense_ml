# Training config for trajectory prediction models (MLP baseline, GRU)
epochs: 100

optimizer:
  name: adamw
  lr: 1e-3
  weight_decay: 1e-4
  betas: [0.9, 0.999]

scheduler:
  name: cosine
  warmup_epochs: 5
  min_lr: 1e-6

loss:
  name: mse  # L2 loss on predicted (x, y) positions

gradient_clip: 1.0
mixed_precision: false  # small model, not needed

# Scheduled sampling — linearly ramp from ss_start to ss_end over ss_warmup_epochs.
# At each training step, with probability `sampling_rate`, the model's own prediction
# replaces ground-truth input. Set scheduled_sampling=false to disable (pure teacher forcing).
scheduled_sampling: false
ss_start: 0.0           # initial sampling rate (0 = pure teacher forcing)
ss_end: 0.5             # final sampling rate
ss_warmup_epochs: 50    # epochs to linearly ramp from ss_start to ss_end

# Multi-step rollout loss — unroll model for K steps during training and compute
# loss over the full rollout. Curriculum: K starts at 1 and increases to max_rollout_steps.
# Set multistep_rollout=false to disable (single-step loss).
multistep_rollout: false
max_rollout_steps: 8    # maximum rollout length K
rollout_warmup_epochs: 40  # epochs for K to reach max_rollout_steps
rollout_detach: false   # if true, detach gradients between rollout steps

# Data
batch_size: 64
num_workers: 4
seq_len: 50          # training sequence length (timesteps)
burn_in_frac: 0.2    # fraction of sequence for burn-in during eval

# Checkpointing
checkpoint_every: 10
keep_top_k: 3

# Logging
log_every: 10        # steps
val_every: 1         # epochs

# Eval rollout time horizons (seconds)
eval_time_horizons: [10, 30, 60, 120, 300]
