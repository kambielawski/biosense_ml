defaults:
  - split: dev    # Select split via CLI: data/split=full
  - _self_

# Path to the BIOSENSE archive directory containing batch-NNNNNN/ subdirs.
# Set via CLI: data.biosense_archive_path=/path/to/archive
biosense_archive_path: null

# Where preprocessed data (shards, HDF5, etc.) is written.
processed_data_dir: null

# Preprocessing mode
preprocessing:
  mode: resize  # "resize" or "autoencoder"

# DataLoader settings
format: webdataset
batch_size: 64
num_workers: 8
pin_memory: true
prefetch_factor: 2

# WebDataset-specific
shard_size: 1000
shuffle_buffer: 5000
