defaults:
  - preprocessing: resize  # Select mode via CLI: data/preprocessing=autoencoder
  - _self_

# Path to the BIOSENSE archive directory containing batch-NNNNNN/ subdirs.
# Set via CLI: data.biosense_archive_path=/path/to/archive
biosense_archive_path: null

# Batch IDs to use. Override via CLI: data.batches=[1,2,3,4,5]
batches: []

# Where preprocessed data (shards, HDF5, etc.) is written.
processed_data_dir: null

# DataLoader settings
format: webdataset
batch_size: 64
num_workers: 8
pin_memory: true
prefetch_factor: 2

# WebDataset-specific
shard_size: 1000
shuffle_buffer: 5000
